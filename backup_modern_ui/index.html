<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderno Access Virtual Plate Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>Moderno Access</h1>
                <span class="badge">Virtual Plate Sim</span>
            </div>
            <div class="status-indicators">
                <div class="indicator" id="mode-indicator">
                    <span class="dot"></span>
                    <span class="text">Online</span>
                </div>
            </div>
        </header>

        <main>
            <section class="grid">
                <!-- Security State Card -->
                <div class="card glass">
                    <h2>Security State</h2>
                    <div class="binary-display" id="security-state-bits">
                        <span>0</span><span>0</span><span>0</span><span>0</span><span>0</span><span>0</span><span>0</span><span>0</span>
                    </div>
                    <p class="subtitle">8-position state register</p>
                </div>

                <!-- Doors Card -->
                <div class="card glass">
                    <h2>Doors / Relays</h2>
                    <div id="doors-container" class="doors-grid">
                        <!-- Doors injected here -->
                    </div>
                </div>

                <!-- Control Panel Card -->
                <div class="card glass">
                    <h2>Simulation Controls</h2>
                    <div class="controls">
                        <div class="control-group">
                            <label>Mode</label>
                            <select id="mode-select">
                                <option value="online">Online</option>
                                <option value="offline">Offline</option>
                                <option value="error">Error</option>
                                <option value="unauthorized">Unauthorized</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Latency (ms)</label>
                            <input type="number" id="latency-input" value="0">
                        </div>
                        <div class="control-group">
                            <label>Auth User</label>
                            <input type="text" id="auth-user" value="admin">
                        </div>
                        <div class="control-group">
                            <label>Auth Pass</label>
                            <input type="text" id="auth-pass" value="admin">
                        </div>
                        <button class="btn-primary" onclick="updateMode()">Update Simulation</button>
                    </div>
                </div>
            </section>

            <section class="bottom-grid">
                <!-- Logs Card -->
                <div class="card glass logs-card">
                    <div class="card-header">
                        <h2>Access Logs</h2>
                        <button class="btn-small" onclick="clearLogs()">Clear</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="logs-table">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>User</th>
                                    <th>Action</th>
                                    <th>Door</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- Users Card -->
                <div class="card glass users-card">
                    <h2>Demo Users</h2>
                    <div class="table-wrapper">
                        <table id="users-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Card ID</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
